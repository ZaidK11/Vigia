# pii-guard — Airtm Internal Template
# Tailored for Vigia compliance agents and ClickHouse query results.
# Covers standard PII + Airtm-specific identifiers found in data_lake / analytics_* schemas.
#
# Tables this config protects:
#   analytics_finance.fact_trx          (trx_id, user_id, amount_usd)
#   analytics_compliance.fact_ar_issues (user_id, email from joined lookups)
#   data_lake.oauth2_onix_users         (id, email, first_name, last_name, ip_address, device_fingerprint)
#   data_lake.security_hub_dodrio_*     (user_id, email, risk_level, score)
#   data_lake.persona_*                 (inquiry_id, user_id, first_name, last_name, birthdate)
#   data_lake.payments_kecleon_*        (airtm_user_id, id)
#   data_lake.operations_silvally_*     (user_id, wallet addresses, risk_score)
#   data_lake.security_hub_dodrio_last_kount_session (user_id, device_fingerprint)

template: enterprise

custom_rules:
  # ── Airtm identifiers ───────────────────────────────────────────────────────

  # Airtm UUID-style user IDs (same format as uuid built-in but explicit label)
  # Built-in uuid rule covers this; keep as passthrough comment for clarity.

  # Transaction IDs — trx_id field (UUID format, covered by built-in uuid rule)

  # Inquiry IDs from Persona — inquiry_id (UUID format, covered by uuid rule)

  # device fingerprint strings (hex/base64 mixed, 32–64 chars)
  - name: device_fingerprint
    source: '\b[a-fA-F0-9]{32,64}\b'
    label: DEVICE_FP

  # Airtm wallet / crypto addresses — Elliptic risk surface
  # Bitcoin: 26–35 chars starting with 1, 3, or bc1
  - name: btc_address
    source: '\b(?:1|3)[a-km-zA-HJ-NP-Z1-9]{25,34}\b|\bbc1[a-z0-9]{39,59}\b'
    label: WALLET

  # Ethereum / EVM addresses
  - name: eth_address
    source: '\b0x[a-fA-F0-9]{40}\b'
    label: WALLET

  # Generic long hex wallet address fallback (Tron, XRP, etc.)
  - name: wallet_hex
    source: '\b[a-fA-F0-9]{40,64}\b'
    label: WALLET

  # Internal system names (treated as INTERNAL even in logs)
  - name: internal_systems
    pattern: '(Dodrio|Galar|Onix|Kecleon|Silvally|Persona)'
    label: INTERNAL

  # Partner names
  - name: partners
    pattern: '(Bridges|Elliptic|Kount)'
    label: PARTNER

  # Company name
  - name: company
    pattern: 'Airtm'
    label: COMPANY

  # ── Regulatory passthrough — Claude needs these for compliance reasoning ────
  - name: keep_regulatory
    pattern: '(OFAC|FinCEN|SAR|AML|KYC|KYB|BSA|UIF|CTR|FATF|PEP|STR|SARs)'
    redact: false

# Disable date-of-birth redaction: compliance prompts include date ranges
# (e.g. "transactions in last 90 days") that would be incorrectly stripped.
disable_builtins:
  - dob
  - us_zip
